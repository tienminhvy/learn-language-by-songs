<div class="p-4 max-w-md mx-auto h-screen flex flex-col bg-white">
  <div class="mb-4 flex items-center">
    <a routerLink="/" class="text-blue-500 mr-4 font-medium">← Back</a>
    <h1 class="text-xl font-bold truncate flex-1 text-center pr-10">{{ song?.title || 'Loading...' }}</h1>
  </div>

  <div *ngIf="song" class="mb-6 flex flex-col items-center">
    <img [src]="song.thumbnail" class="w-48 h-48 object-cover rounded-xl shadow-lg mb-6 border border-gray-100" alt="Album Art">
    
    <div class="w-full bg-gray-50 p-4 rounded-2xl shadow-inner mb-4">
      <audio #audioPlayer 
             [src]="getAudioUrl()" 
             controls 
             class="w-full" 
             (timeupdate)="onTimeUpdate()">
      </audio>
    </div>

    <div class="flex justify-between w-full items-center px-2">
      <div class="text-sm font-semibold text-gray-700 truncate max-w-[70%]">{{ song.artist }}</div>
      <button (click)="showTranslation = !showTranslation" 
              class="text-xs font-medium px-3 py-1 rounded-full border transition-colors"
              [class.bg-blue-600]="showTranslation"
              [class.text-white]="showTranslation"
              [class.border-blue-600]="showTranslation"
              [class.text-gray-500]="!showTranslation"
              [class.border-gray-300]="!showTranslation">
        {{ showTranslation ? 'Hide' : 'Show' }} Translation
      </button>
    </div>
  </div>

  <div class="flex-1 overflow-y-auto lyrics-container py-10 px-2 space-y-8 scroll-smooth">
    <div *ngFor="let line of currentLyrics; let i = index" 
         class="lyric-line text-center transition-all duration-500 transform"
         [class.active]="i === activeLineIndex"
         [class.opacity-25]="i !== activeLineIndex"
         [class.scale-105]="i === activeLineIndex">
      
      <!-- Phonetic / Furigana (JA focus) -->
      <div *ngIf="line.phonetic" 
           class="text-xs text-gray-400 font-normal tracking-wide mb-1 min-h-[1.25rem] leading-relaxed" 
           [innerHTML]="line.phonetic">
      </div>
      
      <!-- Base Text (Any language) -->
      <div class="text-xl font-bold leading-tight" 
           [class.text-blue-700]="i === activeLineIndex"
           [class.text-gray-900]="i !== activeLineIndex">
        {{ line.text }}
      </div>
      
      <!-- Translation -->
      <div *ngIf="showTranslation && line.translations?.length > 0" 
           class="text-base text-gray-500 mt-2 font-medium italic animate-fadeIn">
        {{ line.translations[0].text }}
      </div>
    </div>

    <div *ngIf="song && currentLyrics.length === 0" class="text-center py-20">
      <p class="text-gray-400 italic">No synchronized lyrics found for this song.</p>
    </div>
  </div>
</div>
